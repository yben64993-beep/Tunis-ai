            --primary: #10b981;
            --secondary: #3b82f6;

            --text: #f8fafc;

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--text);

        header {
            padding: 2rem;

            background-clip: text;
            -webkit-text-fill-color: transparent;

        .nav-btn.active {

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);

        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem;

        .wallpaper-card {

            border-radius: 20px;

            position: relative;
            aspect-ratio: 16/9;

            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;

        .wallpaper-card:hover {
            transform: scale(1.05);

        .wallpaper-preview {
            flex: 1;

        const grid = document.getElementById('wallpaperGrid');
        const modal = document.getElementById('fullScreenModal');
        const modalContent = document.getElementById('fullScreenContent');
        const closeModal = document.getElementById('closeModal');

        function renderWallpapers(filter = 'all') {
            grid.innerHTML = '';
            wallpapers.forEach(wp => {
                if (filter !== 'all' && wp.cat !== filter) return;

                const card = document.createElement('div');
                card.className = 'wallpaper-card';
                card.innerHTML = `
                    ${wp.type === 'animated' ? '<span class="badge-animated">متحرك</span>' : ''}
                    <div class="wallpaper-preview" id="preview-${wp.id}">
                        <!-- Render content here -->
                    </div>
                    <div class="wallpaper-info">
                        <span class="wallpaper-title">${wp.title}</span>
                        <button class="download-btn" onclick="downloadWP(${wp.id}, event)">
                            <i class="fa-solid fa-download"></i>
                            تحميل
                        </button>
                    </div>
                `;
                
                card.onclick = () => openModal(wp);
                grid.appendChild(card);
                renderWPContent(`preview-${wp.id}`, wp, true);
            });
        }

        function renderWPContent(containerId, wp, isPreview) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if (wp.content === 'tunisia-art') {
                container.style.cssText = `background: radial-gradient(circle at center, #e70013, #a00); display:flex; align-items:center; justify-content:center;`;
                container.innerHTML = `<svg width="60%" viewBox="0 0 100 100" style="filter: drop-shadow(0 0 20px rgba(0,0,0,0.5))">
                    <circle cx="50" cy="50" r="40" fill="white"/>
                    <path d="M55 35 a18 18 0 1 0 0 30 a14 14 0 1 1 0 -30" fill="#e70013"/>
                    <polygon points="58,50 68,53 62,60 62,40 68,47" fill="#e70013" transform="scale(0.8) translate(14, 12)"/>
                </svg><div style="position:absolute; bottom:10%; font-size:1.5rem; font-weight:bold; color:white; text-shadow:2px 2px 4px rgba(0,0,0,0.5)">TUNISIA</div>`;
            } 
            else if (wp.content === 'palestine-art') {
                container.style.cssText = `background: linear-gradient(to bottom, #000 33.3%, #fff 33.3%, #fff 66.6%, #007a3d 66.6%); display:flex; align-items:center; justify-content:center;`;
                container.innerHTML = `<div style="position:absolute; left:0; top:0; height:100%; width:35%; background:#ef4444; clip-path: polygon(0 0, 100% 50%, 0 100%);"></div>
                <div style="z-index:2; font-size:2rem; font-weight:900; color:rgba(255,255,255,0.2); letter-spacing:10px; transform:rotate(-15deg)">FREE PALESTINE</div>`;
            }
            else if (wp.content === 'arabic-gold') {
                container.style.cssText = `background: #0f172a; display:flex; align-items:center; justify-content:center; overflow:hidden;`;
                container.innerHTML = `
                <div style="position:absolute; top:-20%; left:-20%; width:140%; height:140%; background: radial-gradient(circle, rgba(251,191,36,0.1) 0%, transparent 70%);"></div>
                <div style="color:#d4af37; font-size:2.5rem; text-align:center; direction:rtl; filter:drop-shadow(0 0 10px rgba(212,175,55,0.5))">العلم، العمل، الأمل</div>
                <div style="position:absolute; width:100%; height:2px; background:linear-gradient(to right, transparent, #d4af37, transparent); top:60%"></div>`;
            }
            else if (wp.content === 'mosaic') {
                container.style.cssText = `background: #f1f5f9; display:grid; grid-template-columns: repeat(10, 1fr); gap:2px; padding:2px;`;
                for(let i=0; i<50; i++) {
                    const div = document.createElement('div');
                    div.style.background = i % 3 === 0 ? '#1e40af' : i % 3 === 1 ? '#0ea5e9' : '#fbbf24';
                    div.style.aspectRatio = '1';
                    div.style.clipPath = i % 2 === 0 ? 'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)' : 'none';
                    container.appendChild(div);
                }
            }
            else if (wp.content === 'world-grid') {
                container.style.cssText = `background: #0f172a; display:grid; grid-template-columns: repeat(12, 1fr); gap:5px; padding:10px;`;
                const ArabCodes = ['tn', 'ps', 'sa', 'ma', 'dz', 'eg', 'ly', 'lb', 'jo', 'ae', 'qa', 'kw', 'bh', 'om', 'ye', 'sy', 'iq', 'sd', 'so', 'dj', 'km', 'mr'];
                const allCodes = ["ad","af","ag","ai","al","am","ao","aq","ar","as","at","au","aw","ax","az","ba","bb","bd","be","bf","bg","bh","bi","bj","bl","bm","bn","bo","bq","br","bs","bt","bv","bw","by","bz","ca","cc","cd","cf","cg","ch","ci","ck","cl","cm","cn","co","cr","cu","cv","cw","cx","cy","cz","de","dj","dk","dm","do","dz","ec","ee","eg","eh","er","es","et","fi","fj","fk","fm","fo","fr","ga","gb","gd","ge","gf","gg","gh","gi","gl","gm","gn","gp","gq","gr","gs","gt","gu","gw","gy","hk","hm","hn","hr","ht","hu","id","ie","il","im","in","io","iq","ir","is","it","je","jm","jo","jp","ke","kg","kh","ki","km","kn","kp","kr","kw","ky","kz","la","lb","lc","li","lk","lr","ls","lt","lu","lv","ly","ma","mc","md","me","mf","mg","mh","mk","ml","mm","mn","mo","mp","mq","mr","ms","mt","mu","mv","mw","mx","my","mz","na","nc","ne","nf","ng","ni","nl","no","np","nr","nu","nz","om","pa","pe","pf","pg","ph","pk","pl","pm","pn","pr","ps","pt","pw","py","qa","re","ro","rs","ru","rw","sa","sb","sc","sd","se","sg","sh","si","sj","sk","sl","sm","sn","so","sr","ss","st","sv","sx","sy","sz","tc","td","tf","tg","th","tj","tk","tl","tm","tn","to","tr","tt","tv","tw","tz","ua","ug","um","us","uy","uz","va","vc","ve","vg","vi","vn","vu","wf","ws","ye","yt","za","zm","zw"];
                
                for(let i=0; i<120; i++) {
                    const code = i < ArabCodes.length ? ArabCodes[i] : allCodes[Math.floor(Math.random() * allCodes.length)];
                    const img = document.createElement('img');
                    img.src = `https://flagcdn.com/w80/${code}.png`;
                    img.style.width = '100%';
                    img.style.borderRadius = '2px';
                    img.style.opacity = '0.7';
                    img.style.transition = 'all 0.3s';
                    img.onmouseover = () => { img.style.opacity = '1'; img.style.transform = 'scale(1.2)'; img.style.zIndex = '10'; };
                    img.onmouseout = () => { img.style.opacity = '0.7'; img.style.transform = 'scale(1)'; img.style.zIndex = '1'; };
                    container.appendChild(img);
                }
            }
            else if (wp.content === 'plasma-wave') {
                container.style.cssText = `background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #0f172a); background-size: 400% 400%; animation: plasma 10s ease infinite;`;
                container.innerHTML = `<div style="position:absolute; inset:0; backdrop-filter: blur(40px); background:rgba(255,255,255,0.05)"></div>`;
                if (!document.getElementById('plasma-anim')) {
                    const style = document.createElement('style');
                    style.id = 'plasma-anim';
                    style.innerHTML = `@keyframes plasma { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }`;
                    document.head.appendChild(style);
                }
            }
            else if (wp.content === 'starfield') {
                container.style.background = '#000';
                initStarfield(container, isPreview ? 50 : 300);
            }
            else if (wp.content === 'matrix') {
                container.style.background = '#000';
                initMatrix(container, isPreview);
            }
            else if (wp.content === 'gold-desert') {
                container.style.cssText = `background: linear-gradient(to bottom, #1e293b, #334155, #92400e, #d97706); position:relative; overflow:hidden;`;
                container.innerHTML = `
                    <div style="position:absolute; bottom:0; left:-10%; width:120%; height:40%; background:#d97706; border-radius:100% 100% 0 0; transform: skewY(-5deg); box-shadow:0 -20px 50px rgba(0,0,0,0.5)"></div>

                `;
            }
            else if (wp.content === 'glass-waves') {
                container.style.cssText = `background: #3b82f6; display:flex; align-items:center; justify-content:center;`;
                container.innerHTML = `
                    <div style="width:70%; height:50%; background:rgba(255,255,255,0.1); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.2); border-radius:30px; transform:rotate(-10deg)"></div>
                    <div style="position:absolute; width:70%; height:50%; background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); border-radius:30px; transform:rotate(10deg)"></div>
                `;
            }
            else if (wp.content === 'neon-city') {
                container.style.cssText = `background: #020617; border-bottom: 5px solid #ec4899;`;
                container.innerHTML = `
                    <div style="position:absolute; bottom:0; left:10%; width:15%; height:60%; background:#1e293b; border-top: 2px solid #06b6d4; box-shadow:0 0 20px #06b6d4"></div>
                    <div style="position:absolute; bottom:0; left:30%; width:10%; height:80%; background:#1e293b; border-top: 2px solid #ec4899; box-shadow:0 0 20px #ec4899"></div>
                    <div style="position:absolute; bottom:0; left:45%; width:20%; height:40%; background:#1e293b; border-top: 2px solid #8b5cf6; box-shadow:0 0 20px #8b5cf6"></div>
                    <div style="position:absolute; top:10%; left:50%; font-size:4rem; color:#ec4899; opacity:0.1; font-weight:900">CYBER</div>
                `;
            }
            else {
                container.style.background = `linear-gradient(135deg, ${getRandomColor()}, ${getRandomColor()})`;
                container.innerHTML = `<span style="opacity:0.2; font-size:3rem">${wp.title}</span>`;
            }
        }

        function initMatrix(container, isPreview) {
            const canvas = document.createElement('canvas');
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            container.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            
            const draw = () => {
                canvas.width = container.offsetWidth;
                canvas.height = container.offsetHeight;
                const columns = Math.floor(canvas.width / 20);
                const drops = Array(columns).fill(1);
                
                const render = () => {
                    ctx.fillStyle = 'rgba(0,0,0,0.05)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#0f0';
                    ctx.font = '15px monospace';
                    for(let i=0; i<drops.length; i++) {
                        const text = String.fromCharCode(Math.random() * 128);
                        ctx.fillText(text, i*20, drops[i]*20);
                        if (drops[i]*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                        drops[i]++;
                    }
                    if(!isPreview) requestAnimationFrame(render);
                };
                if(isPreview) { for(let k=0; k<20; k++) render(); }
                else render();
            };
            setTimeout(draw, 100);
        }

        function getRandomColor() {
            const colors = ['#10b981', '#3b82f6', '#8b5cf6', '#f59e0b', '#ef4444', '#ec4899', '#06b6d4'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function openModal(wp) {
            modal.style.display = 'flex';
            renderWPContent('fullScreenContent', wp, false);
            // If animated, start animation
            if (wp.type === 'animated') {
                // specialized init for full screen
            }
        }

        closeModal.onclick = () => {
            modal.style.display = 'none';
        };

        window.onclick = (e) => {
            if (e.target === modal) modal.style.display = 'none';
        };

        function downloadWP(id, e) {
            e.stopPropagation();
            const wp = wallpapers.find(w => w.id === id);
            const preview = document.getElementById(`preview-${id}`);
            
            html2canvas(preview, { scale: 4 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${wp.title}_wallpapers.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Filter functionality
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelector('.nav-btn.active').classList.remove('active');
                btn.classList.add('active');
                renderWallpapers(btn.dataset.cat);
            };
        });

        // Simple Animation Helpers
        function initStarfield(container) {
            const canvas = document.createElement('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            container.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            let stars = Array(200).fill().map(() => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                z: Math.random() * canvas.width,
                o: Math.random()
            }));

            function animate() {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    s.z -= 2;
                    if (s.z <= 0) s.z = canvas.width;
                    let sx = (s.x - canvas.width/2) * (canvas.width/s.z) + canvas.width/2;
                    let sy = (s.y - canvas.height/2) * (canvas.width/s.z) + canvas.height/2;
                    let r = (canvas.width/s.z);
                    ctx.fillStyle = `rgba(255,255,255,${1 - s.z/canvas.width})`;
                    ctx.beginPath();
                    ctx.arc(sx, sy, r, 0, Math.PI*2);
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // Initialize
        renderWallpapers();

    </script>
